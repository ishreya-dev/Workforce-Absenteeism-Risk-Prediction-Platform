name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Verify Project Imports
        run: |
          python -c "from src.api.main import app"
          python -c "from src.model.absenteeism_model import AbsenteeismModel"

      - name: Start FastAPI
        run: |
          uvicorn src.api.main:app --host 127.0.0.1 --port 8000 &
          sleep 10

      - name: Verify API is Health Endpoint
        run: |
          curl http://127.0.0.1:8000/health

      - name: Build Docker Image
        run: |
          docker build -t absenteeism-api -f docker/Dockerfile .